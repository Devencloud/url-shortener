spring.application.name=urlshortner

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/url_shortener}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_ROOT_PASSWORD:randompass123}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

springdoc.model-and-view-allowed=false
springdoc.override-with-generic-response=true


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect