services:
  mysql:
    image: mysql:8
    container_name: url-mysql
    environment:
      MYSQL_ROOT_PASSWORD: randompass123
      MYSQL_DATABASE: url_shortener
    ports:
      - "3306:3306"
    restart: always

  redis:
    image: redis:latest
    container_name: url-redis
    ports:
      - "6379:6379"
    restart: always

  app:
    build: .
    container_name: url-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/url_shortener
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Deven214@#
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    restart: always